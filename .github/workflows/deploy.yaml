name: Deploy Timely
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - run: docker build -t ${{ secrets.DOCKER_USERNAME }}/timely-frontend ./frontend
      - run: docker build -t ${{ secrets.DOCKER_USERNAME }}/timely-nginx ./nginx
      - run: docker build -t ${{ secrets.DOCKER_USERNAME }}/timely-task ./backend/task
      - run: docker build -t ${{ secrets.DOCKER_USERNAME }}/timely-auth ./backend/user

      - run: docker push ${{ secrets.DOCKER_USERNAME }}/timely-frontend
      - run: docker push ${{ secrets.DOCKER_USERNAME }}/timely-nginx
      - run: docker push ${{ secrets.DOCKER_USERNAME }}/timely-task
      - run: docker push ${{ secrets.DOCKER_USERNAME }}/timely-auth

