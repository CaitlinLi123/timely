services:
  task:
    build: 
      context: ./backend/task
      dockerfile: Dockerfile
    container_name: task
    env_file:
      - .env
    depends_on:
      task-db:
        condition: service_healthy
    # networks:
    #   - todo-network

  auth:
    build: 
      context: ./backend/user
      dockerfile: Dockerfile
    container_name: auth
    env_file:
      - .env
    depends_on:
      auth-db:
        condition: service_healthy
    # networks:
    #   - todo-network

  task-db:
    image: postgres:latest
    container_name: postgres-taskdb
    environment:
      POSTGRES_DB: taskdb
      POSTGRES_USER: ${PG_USERNAME}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d taskdb"]
      interval: 10s
      retries: 5
      start_period: 10s
    ports:
      - "5433:5432"  # Avoid conflict with user-db
    # networks:
    #   - todo-network

  auth-db:
    image: postgres:latest
    container_name: postgres-userdb
    environment:
      POSTGRES_DB: userdb
      POSTGRES_USER: ${PG_USERNAME}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d userdb"]
      interval: 10s
      retries: 5
      start_period: 10s
    ports:
      - "5434:5432"  # Avoid conflict with task-db
    # networks:
    #   - todo-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    depends_on:
      task:
        condition: service_started
      auth:
        condition: service_started
    ports:
      - "3000:3000"
    # networks:
    #   - todo-network
  nginx:
    # restart: always
    build: 
      dockerfile: Dockerfile
      context: ./nginx
    depends_on:
      - task
      - auth
      - frontend
    ports:
      - '80:80'

networks:
  todo-network:
    driver: bridge
