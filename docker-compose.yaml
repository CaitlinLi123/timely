version: "3"
services:
  frontend:
    image: "${DOCKER_USER}/timely-frontend"
    hostname: frontend
  auth:
    image: "${DOCKER_USER}/timely-auth"
    hostname: auth
    environment:
      - PG_USER_URL=${PG_USER_URL}
      - PG_USERNAME=${PG_USERNAME}
      - PG_PASSWORD=${PG_PASSWORD}

      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI}

      - SPRING_MAIL_HOST=${SPRING_MAIL_HOST}
      - SPRING_MAIL_USERNAME=${SPRING_MAIL_USERNAME}
      - SPRING_MAIL_PASSWORD=${SPRING_MAIL_PASSWORD}

      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRE=${JWT_EXPIRE}
      - RECOVERY_SECRET=${RECOVERY_SECRET}
      - AUTH_PORT=${AUTH_PORT}
      
  task:
    image: "${DOCKER_USER}/timely-task"
    hostname: task
    environment:
      - PG_TASK_URL=${PG_TASK_URL}
      - PG_USERNAME=${PG_USERNAME}
      - PG_PASSWORD=${PG_PASSWORD}
      - TASK_PORT=${TASK_PORT}
  nginx:
    image: "${DOCKER_USER}/timely-nginx"
    mem_limit: 128m
    hostname: nginx
    depends_on:
      - frontend
      - task
      - auth
    ports:
      - "80:80"